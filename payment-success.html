<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful — Ride With Voxi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0b0f;
      color: #f0f2f7;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #111318;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 24px;
      padding: 3.5rem 2.5rem;
      text-align: center;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 0 60px rgba(0,229,160,0.08);
      animation: fadeUp 0.6s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .icon {
      width: 80px; height: 80px;
      background: rgba(0,229,160,0.1);
      border: 2px solid rgba(0,229,160,0.3);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 1.8rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.04em;
      margin-bottom: 0.8rem;
    }
    p { color: #6b7280; font-weight: 300; line-height: 1.7; margin-bottom: 0.5rem; }
    .ref {
      background: #181c24;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      margin: 1.5rem 0;
      font-size: 0.85rem;
      color: #00e5a0;
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      background: #00e5a0;
      color: #000;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0.85rem 2rem;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>You're all set!</h1>
    <p>Your payment was successful and your seat has been confirmed.</p>
    <p>Show this reference to the driver when boarding.</p>
    <div class="ref" id="ref-display">Loading reference…</div>
    <p style="font-size:0.8rem;">A confirmation will be sent to your registered contact.</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>

  <script>
    const API_BASE = 'https://your-backend.onrender.com';
    const params = new URLSearchParams(window.location.search);
    const ref    = params.get('reference') || params.get('trxref');

    if (ref) {
      document.getElementById('ref-display').textContent = 'Ref: ' + ref;

      // Verify payment with backend
      fetch(`${API_BASE}/api/payments/verify/${ref}`)
        .then(r => r.json())
        .then(data => {
          if (data.error) {
            document.getElementById('ref-display').textContent = 'Verification pending…';
          }
        })
        .catch(() => {});
    } else {
      document.getElementById('ref-display').textContent = 'No reference found';
    }
  </script>
</body>
</html>
